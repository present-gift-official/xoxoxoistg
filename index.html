    <div class="main-card">
      <div class="badge">期間限定</div>
      <h2>私たちは、<br><span class="highlight">生活にお困りの方への</span><br>支援活動を行っております。</h2>

    <div class="steps">

      <div class="step"><div class="step-num">2</div><div class="step-icon">✅</div><div class="step-text">申し込み<br>完了</div></div>
